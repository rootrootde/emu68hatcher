<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 580" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13">
  <title>SD card partition layout - multiple Amiga containers</title>

  <text x="360" y="24" text-anchor="middle" font-size="17" font-weight="700" fill="#7a7a7a">SD card</text>

  <rect x="40" y="44" width="640" height="46" fill="#cfe4ff" stroke="#2563a0" stroke-width="1.5" rx="6"/>
  <text x="60" y="72" font-weight="700" fill="#1a3c66">MBR partition #1 - EMU68BOOT</text>
  <text x="660" y="72" text-anchor="end" font-size="12" fill="#2a4a72">FAT32 (0x0C)</text>

  <rect x="40" y="106" width="640" height="190" fill="#fff1cc" stroke="#a87000" stroke-width="1.5" rx="6"/>
  <text x="60" y="134" font-weight="700" fill="#6b4500">MBR partition #2 - Amiga container</text>
  <text x="660" y="134" text-anchor="end" font-size="12" fill="#7a5500">type 0x76</text>

  <rect x="60" y="150" width="600" height="132" fill="#fffaf0" stroke="#a87000" stroke-width="1" stroke-dasharray="5 3" rx="4"/>
  <text x="78" y="174" font-weight="700" fill="#6b4500">Rigid Disk Block (RDB)</text>

  <rect x="78" y="190" width="564" height="38" fill="#d8ecc8" stroke="#3f7a30" stroke-width="1.2" rx="4"/>
  <text x="96" y="214" font-weight="700" fill="#264c1d">DH0  "Workbench"</text>
  <text x="624" y="214" text-anchor="end" font-size="12" fill="#3a5d2f">PFS3 - bootable</text>

  <rect x="78" y="236" width="564" height="38" fill="#d8ecc8" stroke="#3f7a30" stroke-width="1.2" rx="4"/>
  <text x="96" y="260" font-weight="700" fill="#264c1d">DH1  "Work"</text>
  <text x="624" y="260" text-anchor="end" font-size="12" fill="#3a5d2f">PFS3</text>

  <rect x="40" y="312" width="640" height="240" fill="#fff1cc" stroke="#a87000" stroke-width="1.5" rx="6"/>
  <text x="60" y="340" font-weight="700" fill="#6b4500">MBR partition #3 - Amiga container</text>
  <text x="660" y="340" text-anchor="end" font-size="12" fill="#7a5500">type 0x76</text>

  <rect x="60" y="356" width="600" height="182" fill="#fffaf0" stroke="#a87000" stroke-width="1" stroke-dasharray="5 3" rx="4"/>
  <text x="78" y="380" font-weight="700" fill="#6b4500">Rigid Disk Block (RDB)</text>

  <rect x="78" y="396" width="564" height="38" fill="#d8ecc8" stroke="#3f7a30" stroke-width="1.2" rx="4"/>
  <text x="96" y="420" font-weight="700" fill="#264c1d">SDH0  "Games"</text>
  <text x="624" y="420" text-anchor="end" font-size="12" fill="#3a5d2f">PFS3</text>

  <rect x="78" y="442" width="564" height="38" fill="#d8ecc8" stroke="#3f7a30" stroke-width="1.2" rx="4"/>
  <text x="96" y="466" font-weight="700" fill="#264c1d">SDH1  "Media"</text>
  <text x="624" y="466" text-anchor="end" font-size="12" fill="#3a5d2f">PFS3</text>

  <rect x="78" y="488" width="564" height="38" fill="#eef5e6" stroke="#3f7a30" stroke-width="1.2" stroke-dasharray="4 3" rx="4"/>
  <text x="96" y="512" font-weight="700" fill="#264c1d">SDH2 ...</text>
  <text x="624" y="512" text-anchor="end" font-size="12" fill="#3a5d2f">PFS3 / FFS</text>
</svg>
