# host tools and build-time downloads.
#
# each entry has a `type` that selects the download strategy:
#   platform-url - explicit url per <os>-<arch> key under `platforms:`
#                  (fallback to bare `<os>` key, e.g. 7zr-bootstrap/windows)
#   direct-url   - single url regardless of host platform
#
# hst-imager / hst-amiga are pinned to an exact github release. bump the
# version + commit hash in the filenames below to upgrade.

