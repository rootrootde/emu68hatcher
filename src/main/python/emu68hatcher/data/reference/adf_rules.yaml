'3.9':
# 3.9 installs from the CD as one volume: Workbench3.5 is the base tree,
# Workbench3.9 overlays the 3.9 update on top (higher sequence wins).
- adf: AmigaOS3_9
  from: OS-Version3.9/Workbench3.5/*
  to: /
  recursive: true
  sequence: 1
  package: os_install
- adf: AmigaOS3_9
  from: OS-Version3.9/Workbench3.9/*
  to: /
  recursive: true
  sequence: 2
  package: os_install
# active keymaps live on the Emergency-Boot tree (Workbench3.5/Devs/Keymaps is
# empty); without these Devs/Keymaps only the built-in american keymap shows
- adf: AmigaOS3_9
  from: Emergency-Boot/Devs/Keymaps/*
  to: Devs/Keymaps/
  recursive: true
  sequence: 3
  package: os_install
# the separate Locale tree carries Countries/Languages/Flags for the setup wizard
- adf: AmigaOS3_9
  from: OS-Version3.9/Locale/*
  to: Locale/
  recursive: true
  sequence: 3
  package: os_install
