name: emu68_tools
friendly_name: Emu68 Tools
group: System
description: 'emu68 tools'
versions:
- '3.1'
- '3.2'
- 3.2.2.1
- 3.2.3
- '3.9'
mandatory: true
download:
  source: github
  repo: michalsc/Emu68-tools
  filename: Emu68-tools.zip
install:
- from: WaitUntilConnected/WaitUntilConnected
  to: C/
- from: EmuControl/EmuControl
  to: C/
- from: Emu68EDID/Emu68EDID
  to: C/
- from: Emu68Info/Emu68Info
  to: C/
  rename: EMU68INFO
- from: EmuControl/EmuControl
  to: Utilities/
- from: EmuControl/EmuControl.info
  to: Utilities/
- from: VideoCore/VideoCore.card
  to: Libs/Picasso96/
- from: Emu68-WiFi/Devs/*
  to: Devs/
  recursive: true
- from: I2C/i2c.library
  to: Libs/
- from: I2C/SetClockI2C
  to: C/
- from: ListDeviceTree/ListDeviceTree
  to: C/
